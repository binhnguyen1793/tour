<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xổ Số Pro Max AI</title>

<!-- KQXS Minh Ngọc -->
<link rel="stylesheet" href="https://www.minhngoc.net.vn/style/bangketqua_mini.css">
<script src="https://www.minhngoc.net.vn/jquery/jquery-1.7.2.js"></script>

<style>
:root{
  --main:#7a1f2b;        /* đỏ đô */
  --main-soft:#a83244;
  --bg1:#020617;
  --bg2:#0f172a;
  --card:rgba(30,41,59,0.6);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Segoe UI',system-ui;
  background: radial-gradient(circle at top,var(--bg2),var(--bg1));
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  backdrop-filter: blur(10px);
  background:rgba(2,6,23,0.7);
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.logo{font-weight:700;color:var(--main-soft)}
.wallet{
  background:var(--card);
  padding:8px 12px;
  border-radius:10px;
}

/* BUTTON */
.btn{
  padding:10px 12px;
  background:linear-gradient(135deg,var(--main),var(--main-soft));
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  color:#fff;
  transition:.2s;
}
.btn:hover{
  transform:translateY(-1px) scale(1.03);
  box-shadow:0 0 18px rgba(122,31,43,.8);
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:14px;
  padding:14px;
}
@media(max-width:900px){ .container{grid-template-columns:1fr;} }

/* CARD */
.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 15px 40px rgba(0,0,0,.45);
}

/* BONUS */
.bonus{
  background: linear-gradient(90deg,#7a1f2b,#a83244);
  color:#fff;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-weight:800;
  box-shadow:0 0 24px rgba(122,31,43,.9);
}

/* BET */
.bet-item{
  display:flex;
  justify-content:space-between;
  background:#1e293b;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border-left:4px solid var(--main);
}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#0f172a;
  color:#fff;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,.8);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-box{
  background:#0f172a;
  padding:18px;
  border-radius:14px;
  width:92%;
  max-width:420px;
}

/* CHAT */
#chatBox{
  height:200px;
  overflow:auto;
  background:#020617;
  padding:10px;
  border-radius:10px;
}
.chat-user{color:#38bdf8}
.chat-ai{color:#f87171}

/* RESULT */
#box_kqxs_minhngoc{width:100%;overflow-x:auto}
#box_kqxs_minhngoc table{width:100% !important;font-size:14px !important}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🔥 XỔ SỐ PRO MAX AI</div>
  <div>
    <span class="wallet">💰 <span id="balance">0</span>đ</span>
    <button class="btn" onclick="openNap()">Nạp</button>
  </div>
</div>

<div class="container">

<!-- LEFT -->
<div>
  <div class="bonus">🎁 Nạp lần đầu X3</div>

  <div class="card">
    <h3>🎯 Đặt vé</h3>
    <button class="btn" onclick="openBet()">+ Thêm vé</button>
    <div id="list"></div>
  </div>

  <div class="card">
    <h3>📜 Lịch sử</h3>
    <div id="history" class="history"></div>
  </div>

  <!-- AI -->
  <div class="card">
    <h3>🤖 AI Dự đoán</h3>
    <div id="chatBox"></div>
    <input id="userInput" placeholder="Nhập: dự đoán hôm nay..." />
    <button class="btn" onclick="sendAI()">Gửi</button>
    <button class="btn" style="margin-top:5px;background:#38bdf8" onclick="randomSo()">🎲 Random</button>
  </div>

  <!-- CHECK -->
  <div class="card">
    <h3>🔍 Dò số</h3>
    <input id="checkSo" placeholder="Nhập số">
    <button class="btn" onclick="checkKetQua()">Dò</button>
    <div id="checkResult"></div>
  </div>
</div>

<!-- RIGHT -->
<div style="width:100%; display:flex; justify-content:center;">
  <iframe
    src="https://www.minhngoc.net.vn/free/index.php"
    width="100%"
    height="900"
    frameborder="0"
    scrolling="auto"
    style="
      border-radius:12px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
      background:#fff;
      max-width:500px;
    ">
  </iframe>
</div>

</div>

<!-- MODAL BET -->
<div class="modal" id="betModal">
<div class="modal-box">
<h3>Đặt vé</h3>
<input id="so" placeholder="Số">
<select id="loai">
<option>Lô</option>
<option>Đề</option>
<option>Xiên 2</option>
</select>
<input id="tien" type="number" placeholder="Tiền">
<button class="btn" onclick="addBet()">Xác nhận</button>
<button class="btn" style="background:red;margin-top:5px" onclick="closeBet()">Đóng</button>
</div>
</div>

<!-- MODAL NAP -->
<div class="modal" id="napModal">
<div class="modal-box">
<h3>Nạp tiền</h3>
<input id="napTien" type="number">
<button class="btn" onclick="nap()">Xác nhận</button>
</div>
</div>

<script>
// ===== STATE (localStorage) =====
let balance = Number(localStorage.getItem("balance")||0);
let firstNap = localStorage.getItem("firstNap")!=="false";
let bets = JSON.parse(localStorage.getItem("bets")||"[]");

// ===== INIT =====
function init(){
  updateBalance();
  renderBets();
}
function save(){
  localStorage.setItem("balance",balance);
  localStorage.setItem("firstNap",firstNap);
  localStorage.setItem("bets",JSON.stringify(bets));
}

// ===== WALLET =====
function updateBalance(){
  document.getElementById("balance").innerText = balance.toLocaleString();
}
function openNap(){napModal.style.display="flex";}
function nap(){
  let t = Number(napTien.value||0);
  if(!t) return alert("Nhập số tiền");
  if(firstNap){ t*=3; firstNap=false; }
  balance+=t;
  updateBalance(); save();
  napModal.style.display="none";
}

// ===== BET =====
function openBet(){betModal.style.display="flex";}
function closeBet(){betModal.style.display="none";}
function addBet(){
  let s = document.getElementById("so").value.trim();
  let loai = document.getElementById("loai").value;
  let tien = Number(document.getElementById("tien").value||0);
  if(!s||!tien) return alert("Nhập đủ thông tin");
  if(balance < tien) return alert("Không đủ tiền");

  balance -= tien;
  let item = {so:s, loai, tien, time:Date.now()};
  bets.unshift(item);

  updateBalance(); save(); renderBets();
  closeBet();
}
function renderBets(){
  list.innerHTML=""; history.innerHTML="";
  bets.slice(0,50).forEach(b=>{
    let el=document.createElement("div");
    el.className="bet-item";
    el.innerHTML=`<span>${b.so} (${b.loai})</span><b>${b.tien.toLocaleString()}đ</b>`;
    list.appendChild(el);

    let h=document.createElement("div");
    h.textContent = "✔ " + b.so + " - " + b.tien.toLocaleString()+"đ";
    history.appendChild(h);
  });
}

// ===== AI (heuristic) =====
function sendAI(){
  let input = userInput.value.trim();
  if(!input) return;
  let chat = document.getElementById("chatBox");

  let u=document.createElement("div");
  u.className="chat-user"; u.textContent="👤 "+input;
  chat.appendChild(u);

  let loading=document.createElement("div");
  loading.className="chat-ai"; loading.textContent="🤖 Đang phân tích dữ liệu gần nhất...";
  chat.appendChild(loading);

  setTimeout(()=>{
    loading.remove();

    // Heuristic: lấy tần suất chữ số từ bets gần nhất
    let freq = Array(10).fill(0);
    bets.slice(0,100).forEach(b=>{
      (b.so.match(/\d/g)||[]).forEach(d=>freq[Number(d)]++);
    });

    // tạo 2 số 2 chữ số ưu tiên digit có freq cao
    function pickDigit(){
      let sum = freq.reduce((a,b)=>a+b,0) || 1;
      let r = Math.random()*sum, acc=0;
      for(let i=0;i<10;i++){ acc+=freq[i]||1; if(r<=acc) return i; }
      return Math.floor(Math.random()*10);
    }
    function makeNum(){
      return (""+pickDigit()+pickDigit());
    }

    let so1 = makeNum();
    let so2 = makeNum();

    let ai=document.createElement("div");
    ai.className="chat-ai";
    ai.innerHTML = `🤖 Gợi ý: <b>${so1} - ${so2}</b><br><small>(ưu tiên chữ số xuất hiện nhiều trong lịch sử gần nhất)</small>`;
    chat.appendChild(ai);

    chat.scrollTop = chat.scrollHeight;
  },1200);
}

// ===== RANDOM =====
function randomSo(){
  let so = Math.floor(Math.random()*100).toString().padStart(2,'0');
  alert("🎲 Số may mắn: " + so);
}

// ===== CHECK =====
function checkKetQua(){
  let so = document.getElementById("checkSo").value;
  if(!so) return;
  let kq = document.getElementById("checkResult");
  let trung = Math.random() > 0.7;
  if(trung){
    kq.innerHTML = "🎉 Trúng! " + so;
    kq.style.color="lime";
  }else{
    kq.innerHTML = "❌ Chưa trúng";
    kq.style.color="red";
  }
}

// ===== START =====
init();
</script>

87 1.23% (10 lượt) 88 0.99% (8 lượt) 89 0.99% (8 lượt) 90 0.86% (7 lượt) 91 1.98% (16 lượt) 92 1.36% (11 lượt) 93 0.86% (7 lượt) 94 1.36% (11 lượt) 95 1.48% (12 lượt) 96 0.37% (3 lượt) 97 0.99% (8 lượt) 98 0.62% (5 lượt)
99 0.86% (7 lượt)
`;

// ===== PARSE =====
function parseData(){
  return rawData.trim().split("\n").map(line=>{
    let p = line.trim().split(/\s+/);
    return {so:p[0], percent:parseFloat(p[1]), count:parseInt(p[2])};
  });
}

// ===== ANALYZE =====
function analyze(){
  let data = parseData();

  let sorted = [...data].sort((a,b)=>b.count-a.count);
  let hot = sorted.slice(0,5);

  let gan = [...data].sort((a,b)=>a.count-b.count).slice(0,5);

  let dao = hot[0].so.split("").reverse().join("");

  return {hot, gan, dao, data};
}

// ===== AI =====
function aiReply(q){
  let a = analyze();
  let data = a.data;

  q = q.toLowerCase();

  // ===== HELLO =====
  if(q.match(/hi|hello|chào|alo|ai đó/)){
    return "👋 Chào bạn! Bạn muốn soi lô, hỏi số hay tìm kèo hôm nay?";
  }

  // ===== THANK =====
  if(q.includes("cảm ơn")){
    return "😄 Không có gì, chúc bạn ăn to!";
  }

  // ===== HỎI SỐ CỤ THỂ =====
  let numbers = q.match(/\d{2}/g);
  if(numbers && numbers.length === 1){
    let so = numbers[0];
    let f = data.find(x=>x.so==so);

    if(f){
      let danhgia = f.count >= 12 ? "🔥 mạnh"
                  : f.count >= 8 ? "⚖️ trung bình"
                  : "💀 yếu";

      return `
📊 Số ${so}:
- ${f.count} lần (${f.percent}%)
- Đánh giá: ${danhgia}

👉 ${f.count>=10?"Có thể chơi":"Cân nhắc thêm"}
`;
    }
  }

  // ===== SO SÁNH 2 SỐ =====
  if(numbers && numbers.length === 2){
    let s1 = data.find(x=>x.so==numbers[0]);
    let s2 = data.find(x=>x.so==numbers[1]);

    if(s1 && s2){
      let better = s1.count > s2.count ? s1.so : s2.so;

      return `
⚖️ So sánh:
${s1.so}: ${s1.count} lần
${s2.so}: ${s2.count} lần

👉 ${better} đang tốt hơn
`;
    }
  }

  // ===== LÔ NÓNG =====
  if(q.includes("mạnh") || q.includes("hot") || q.includes("chạy")){
    return "🔥 Lô mạnh: " + a.hot.map(x=>x.so).join(", ");
  }

  // ===== LÔ GAN =====
  if(q.includes("gan") || q.includes("lâu")){
    return "💀 Lô gan: " + a.gan.map(x=>x.so).join(", ");
  }

  // ===== TOP =====
  if(q.includes("top") || q.includes("nhiều nhất")){
    return "📈 Top số: " + a.hot.map(x=>x.so).join(", ");
  }

  // ===== TIỀM NĂNG / KHÁC =====
  if(q.includes("khác") || q.includes("tiềm năng") || q.includes("ngoài")){
    let mid = data
      .filter(x=>x.count>=8 && x.count<=11)
      .slice(0,5);

    return "🎯 Số tiềm năng: " + mid.map(x=>x.so).join(", ");
  }

  // ===== ĐẢO =====
  if(q.includes("đảo") || q.includes("lộn")){
    return "🔄 Đảo đẹp: " + a.dao;
  }

  // ===== LÝ DO =====
  if(q.includes("tại sao") || q.includes("vì sao") || q.includes("logic")){
    return `
📊 AI dựa trên:
- Tần suất 30 ngày
- So sánh lô nóng / gan
- Phân tích xu hướng

👉 Ưu tiên số có xác suất cao hơn trung bình
`;
  }

  // ===== CHƠI GÌ =====
  if(q.includes("đánh") || q.includes("chơi")){
    return `
🎯 Gợi ý:
🔥 ${a.hot[0].so}, ${a.hot[1].so}
💀 ${a.gan[0].so}
🔄 ${a.dao}

👉 Đánh 2 mạnh + 1 gan
`;
  }

  // ===== CHIẾN LƯỢC =====
  if(q.includes("chiến lược") || q.includes("cách chơi")){
    return `
🧠 Gợi ý:
- 2 số mạnh
- 1 số gan
- không nên đánh quá nhiều

👉 quản lý vốn là quan trọng nhất
`;
  }

  // ===== CONFIRM =====
  if(q.includes("chuẩn") || q.includes("ok") || q.includes("ổn không")){
    return "🤖 Đây là phân tích theo thống kê, bạn nên cân nhắc thêm.";
  }

  // ===== DEFAULT =====
  return `
🤖 Bạn có thể hỏi:
- "đánh con gì"
- "con số bạn đang nghĩ tới ổn không"
- "lô gan là gì"
- "còn con nào khác"

📊 Mình sẽ phân tích dựa trên data 30 ngày
`;
}

// ===== CHAT =====
function sendAI(){
  let inputBox = document.getElementById("userInput");
  let input = inputBox.value.trim();
  if(!input) return;

  let chat = document.getElementById("chatBox");

  let u = document.createElement("div");
  u.className="chat-user";
  u.innerText="👤 "+input;
  chat.appendChild(u);

  let loading = document.createElement("div");
  loading.className="chat-ai";
  loading.innerText="🤖 Đang phân tích...";
  chat.appendChild(loading);

  inputBox.value = ""; // 🔥 clear luôn khi gửi

  setTimeout(()=>{
    loading.remove();

    let ai = document.createElement("div");
    ai.className="chat-ai";
    ai.innerHTML="🤖 "+aiReply(input);
    chat.appendChild(ai);

    chat.scrollTop = chat.scrollHeight;
  },800);
}
document.getElementById("userInput").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    sendAI();
  }
});
</script>
